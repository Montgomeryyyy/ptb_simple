paths: 
  tabular_ehr_path: ../EHR_extract/outputs/table_test_make_main_table.yaml.csv
  test_ids_path: test_data/test.json
  train_ids_path: test_data/train.json
  predictions_path: outputs/predictions_mlp.csv
  discards_path: outputs/discards_mlp.json

model:
  name: mlp
  params:
    hidden_layer_sizes: [256, 128]
    activation: relu
    solver: adam
    alpha: 1e-4
    batch_size: 256
    learning_rate_init: 1e-3
    max_iter: 200
    early_stopping: True
    n_iter_no_change: 10
    validation_fraction: 0.1
    random_state: 42

data:
  id_col: b_cpr
  label_col: ptb
  label_func: 
    func: get_binary_label
    args:
      col: GA_days
      operator: "<"
      value: 259
      new_col: ptb
  drop_feature_cols:
    - m_cpr
    - pregnancy_start
    - pregnancy_end
    - GA_days
    - GA_weeks
    - current_c_section
    - current_induced_labor
    - current_ptb