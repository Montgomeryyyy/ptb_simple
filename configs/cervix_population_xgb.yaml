paths: 
  tabular_ehr_path: ../EHR_extract/outputs/table_SDS_table_cervix.yaml.csv
  test_data_path: ../../data/img_data_link/test.csv 
  train_data_path: ../../data/img_data_link/train.csv
  predictions_path: outputs/predictions/predictions_xgboost_cervix_population.csv
  discards_path: outputs/predictions/discards_xgboost_cervix_population.json

model:
  name: xgboost
  params:
    n_estimators: 500
    max_depth: 4
    learning_rate: 0.05
    subsample: 0.9
    colsample_bytree: 0.9
    reg_lambda: 1.0
    objective: binary:logistic

data:
  id_col: b_cpr
  label_col: ptb
  label_func: 
    func: get_binary_label
    GA_col: GA
    operator: "<"
    value: 259
    new_col: ptb
  drop_feature_cols:
    - m_cpr
    - pregnancy_start
    - pregnancy_end
    - GA_days
    - GA_weeks
    - current_c_section
    - current_induced_labor
    - current_ptb
